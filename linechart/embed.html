<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Loading Line Chart…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./">
</head>
<body>
  <p>Redirecting to Line Chart… If you are not redirected, <a id="linechart-link" href="./">open the Line Chart page</a>.</p>
  <script>
    (function redirectToStandalonePage() {
      try {
        var target = new URL('./', window.location.href);
        target.search = window.location.search || '';
        target.hash = window.location.hash || '';
        var link = document.getElementById('linechart-link');
        if (link) {
          link.setAttribute('href', target.toString());
        }
        window.location.replace(target.toString());
      } catch (error) {
        console.warn('Line chart embed redirect failed', error);
      }
    })();
  </script>
</body>
</html>
