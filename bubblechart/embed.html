<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Loading Bubble Chart…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./">
</head>
<body>
  <p>Redirecting to Bubble Chart… If you are not redirected, <a id="bubblechart-link" href="./">open the Bubble Chart page</a>.</p>
  <script>
    (function redirectToStandalonePage() {
      try {
        var target = new URL('./', window.location.href);
        target.search = window.location.search || '';
        target.hash = window.location.hash || '';
        var link = document.getElementById('bubblechart-link');
        if (link) {
          link.setAttribute('href', target.toString());
        }
        window.location.replace(target.toString());
      } catch (error) {
        console.warn('Bubble chart embed redirect failed', error);
      }
    })();
  </script>
</body>
</html>
