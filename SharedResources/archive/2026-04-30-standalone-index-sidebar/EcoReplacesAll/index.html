<body>
  <main>
    <h1>Opening Eco Replaces All…</h1>
    <p>If you are not redirected automatically, <a id="eco-redirect" href="embed.html">continue to the embed experience</a>.</p>
  </main>
  <script>
    (function redirectToEmbed() {
      try {
        var target = new URL('embed.html', window.location.href);
        var search = window.location.search || '';
        var hash = window.location.hash || '';
        if (search) {
          target.search = search;
        }
        if (hash) {
          target.hash = hash;
        }
        var link = document.getElementById('eco-redirect');
        if (link) {
          link.setAttribute('href', target.toString());
        }
        window.location.replace(target.toString());
      } catch (error) {
        console.warn('EcoReplacesAll redirect failed', error);
      }
    })();
  </script>
